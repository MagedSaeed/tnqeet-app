# Weights download once to ./docker_volume/models (mounted at HF_HOME) — keeps the image small.
services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      HF_HOME: /home/user/.cache/huggingface
      FRONTEND_DIST: /app/frontend_dist
      TNQEET_MAX_RESIDENT_MODELS: "2" # set 1 for low RAM
    volumes:
      - ./docker_volume/models:/home/user/.cache/huggingface
