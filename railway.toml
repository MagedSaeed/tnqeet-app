# Railway config. Weights download at runtime into HF_HOME=/home/user/.cache/huggingface,
# so attach a Railway VOLUME mounted at that path (`railway volume add
# --mount-path /home/user/.cache/huggingface`). The image stays small; models
# download once to the volume and persist across deploys.
#
# Recommended service variable on small plans:
#   TNQEET_MAX_RESIDENT_MODELS=1   (lower peak RAM)

[build]
builder = "dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
